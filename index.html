<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LFelipe - Tech</title>
    <style>
        /* Configurações globais para o Modo Escuro */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            text-align: center; 
            padding: 80px 20px;
            margin: 0;
        }
        
        /* Container principal para centralizar e dar um aspecto elegante */
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border-top: 4px solid #00adb5; /* Detalhe em azul tecnológico */
        }

        h1 { 
            color: #00adb5; 
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p { 
            color: #b3b3b3; 
            font-size: 1.2rem; 
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Display do Carimbo de Data/Hora Estático */
        .clock-container {
            font-family: 'Courier New', Courier, monospace;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 15px 25px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 173, 181, 0.2);
            letter-spacing: 1px;
        }

        .time-row {
            font-size: 1.1rem;
            color: #00adb5;
            margin-bottom: 5px;
        }

        /* Estilo menor e mais discreto para as métricas secundárias */
        .debug-row {
            font-size: 0.85rem;
            color: #888888;
            border-top: 1px dashed rgba(0, 173, 181, 0.15);
            padding-top: 5px;
            margin-top: 5px;
            text-align: left;
        }

        /* Moldura do botão de status */
        .status-badge {
            display: inline-block;
            background-color: rgba(0, 173, 181, 0.1);
            color: #00adb5;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            border: 1px solid rgba(0, 173, 181, 0.3);
            display: block;
            width: fit-content;
            margin: 0 auto;
        }

        /* Estilização exclusiva do LED Verde */
        .led-verde {
            color: #00ff66; /* Verde vivo */
            margin-right: 5px;
            text-shadow: 0 0 8px #00ff66, 0 0 15px #00ff66; /* Efeito de luz acesa */
        }

        /* Indicador de Versão Discreto no Canto Inferior Direito */
        .version-tag {
            position: fixed;
            bottom: 15px;
            right: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            color: #555555;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>LFelipe - Tech</h1>
        <p>O domínio <strong>lfelipe.tec.br</strong> está configurado e operacional.</p>
        
        <div class="clock-container">
            <div id="clock" class="time-row">Sincronizando requisição...</div>
            <div class="debug-row">
                <div id="local-clock">Hora do dispositivo: ...</div>
                <div id="offset">Desvio do relógio: ...</div>
            </div>
        </div>

        <span class="status-badge"><span class="led-verde">●</span> Servidor Ativo</span>
    </div>

    <div class="version-tag">v.260629.04</div>

    <script>
        function formatarData(dataObject) {
            const dia = String(dataObject.getDate()).padStart(2, '0');
            const mes = String(dataObject.getMonth() + 1).padStart(2, '0');
            const ano = dataObject.getFullYear();
            const horas = String(dataObject.getHours()).padStart(2, '0');
            const minutos = String(dataObject.getMinutes()).padStart(2, '0');
            const segundos = String(dataObject.getSeconds()).padStart(2, '0');
            return `${dia}/${mes}/${ano} ${horas}:${minutos}:${segundos}`;
        }

        async function processarMetricasTempo() {
            let horaServidor;
            const horaLocalDispositivo = new Date();

            try {
                // Faz uma requisição HEAD super leve para a própria página para ler os Headers do servidor
                const response = await fetch(window.location.href, { method: 'HEAD' });
                const dateHeader = response.headers.get('Date');
                
                // Converte a hora GMT do servidor do GitHub para o fuso local automaticamente
                horaServidor = new Date(dateHeader);
            } catch (error) {
                console.log('Erro ao ler cabeçalho do servidor, usando fallback local.', error);
                horaServidor = new Date();
            }

            // Calcula o desvio exato em segundos
            const timeOffsetInSeconds = (horaServidor.getTime() - horaLocalDispositivo.getTime()) / 1000;

            // Preenche os campos na tela de forma estática
            document.getElementById('clock').innerHTML = `Última requisição: ${formatarData(horaServidor)}`;
            document.getElementById('local-clock').innerHTML = `Hora do dispositivo: ${formatarData(horaLocalDispositivo)}`;
            
            const sinal = timeOffsetInSeconds > 0 ? '+' : '';
            document.getElementById('offset').innerHTML = `Desvio do relógio: ${sinal}${timeOffsetInSeconds.toFixed(1)}s`;
        }

        // Executa uma única vez no carregamento
        processarMetricasTempo();
    </script>

</body>
</html>
