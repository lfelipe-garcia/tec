<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LFelipe - Tech</title>
    <style>
        /* Configurações globais para o Modo Escuro */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            text-align: center; 
            padding: 60px 20px;
            margin: 0;
        }
        
        /* Container principal para centralizar e dar um aspecto elegante */
        .container {
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
            margin: 0 auto;
            background-color: #1e1e1e;
            padding: 40px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border-top: 4px solid #00adb5; /* Detalhe em azul tecnológico */
        }

        h1 { 
            color: #00adb5; 
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p { 
            color: #b3b3b3; 
            font-size: 1.2rem; 
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Display do Carimbo de Data/Hora Estático */
        .clock-container {
            font-family: 'Courier New', Courier, monospace;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 15px 20px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 173, 181, 0.2);
            letter-spacing: 1px;
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
        }

        /* Estrutura flexível para a linha principal do relógio */
        .time-row {
            font-size: 1.1rem;
            color: #00adb5;
            margin-bottom: 8px;
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap; /* Permite a quebra controlada se necessário */
        }

        /* Seção de Debug Inteligente e Espaçada */
        .debug-section {
            border-top: 1px dashed rgba(0, 173, 181, 0.15);
            padding-top: 8px;
            margin-top: 8px;
        }

        /* Estrutura estilo grid/coluna para organizar os dados */
        .debug-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #888888;
            margin-bottom: 6px;
        }

        .debug-row:last-child {
            margin-bottom: 0;
        }

        /* Moldura do botão de status */
        .status-badge {
            display: inline-block;
            background-color: rgba(0, 173, 181, 0.1);
            color: #00adb5;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            border: 1px solid rgba(0, 173, 181, 0.3);
            display: block;
            width: fit-content;
            margin: 0 auto;
        }

        /* Estilização exclusiva do LED Verde */
        .led-verde {
            color: #00ff66; 
            margin-right: 5px;
            text-shadow: 0 0 8px #00ff66, 0 0 15px #00ff66;
        }

        /* Indicador de Versão Discreto */
        .version-tag {
            position: fixed;
            bottom: 15px;
            right: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            color: #555555;
            user-select: none;
        }

        /* ==========================================================================
           MEDIA QUERY: Ajustes específicos para telas de celulares (até 480px)
           ========================================================================== */
        @media (max-width: 480px) {
            body {
                padding: 30px 10px;
            }
            .container {
                padding: 30px 15px;
            }
            h1 {
                font-size: 2rem;
            }
            p {
                font-size: 1rem;
            }
            /* Força a quebra em duas linhas limpas no celular e centraliza */
            .time-row {
                flex-direction: column;
                gap: 4px;
                font-size: 1rem;
            }
            .time-label {
                color: rgba(0, 173, 181, 0.7); /* Rótulo sutilmente mais suave no celular */
            }
            .debug-row {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>LFelipe - Tech</h1>
        <p>O domínio <strong>lfelipe.tec.br</strong> está configurado e operacional.</p>
        
        <div class="clock-container">
            <div class="time-row">
                <span class="time-label">Última requisição:</span>
                <span id="clock">Sincronizando...</span>
            </div>
            <div class="debug-section">
                <div class="debug-row">
                    <span>Hora local:</span>
                    <span id="local-clock">...</span>
                </div>
                <div class="debug-row">
                    <span>Desvio:</span>
                    <span id="offset">...</span>
                </div>
            </div>
        </div>

        <span class="status-badge"><span class="led-verde">●</span> Servidor Ativo</span>
    </div>

    <div class="version-tag">v.260629.07</div>

    <script>
        function formatarData(dataObject) {
            const dia = String(dataObject.getDate()).padStart(2, '0');
            const mes = String(dataObject.getMonth() + 1).padStart(2, '0');
            const ano = dataObject.getFullYear();
            const horas = String(dataObject.getHours()).padStart(2, '0');
            const minutes = String(dataObject.getMinutes()).padStart(2, '0');
            const segundos = String(dataObject.getSeconds()).padStart(2, '0');
            return `${dia}/${mes}/${ano} ${horas}:${minutes}:${segundos}`;
        }

        async function processarMetricasTempo() {
            let horaServidor;
            const horaLocalDispositivo = new Date();

            try {
                const response = await fetch(window.location.href, { method: 'HEAD' });
                const dateHeader = response.headers.get('Date');
                horaServidor = new Date(dateHeader);
            } catch (error) {
                console.log('Erro ao ler cabeçalho do servidor, usando fallback local.', error);
                horaServidor = new Date();
            }

            const timeOffsetInSeconds = (horaServidor.getTime() - horaLocalDispositivo.getTime()) / 1000;

            // Injeta apenas o valor de tempo no ID correspondente, sem misturar com o rótulo fixo
            document.getElementById('clock').innerHTML = formatarData(horaServidor);
            document.getElementById('local-clock').innerHTML = formatarData(horaLocalDispositivo);
            
            const sinal = timeOffsetInSeconds > 0 ? '+' : '';
            document.getElementById('offset').innerHTML = `${sinal}${timeOffsetInSeconds.toFixed(1)}s`;
        }

        processarMetricasTempo();
    </script>

</body>
</html>
