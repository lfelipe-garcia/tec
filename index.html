<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LFelipe - Tech</title>
    <style>
        /* Configurações globais para o Modo Escuro */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            text-align: center; 
            padding: 80px 20px;
            margin: 0;
        }
        
        /* Container principal para centralizar e dar um aspecto elegante */
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border-top: 4px solid #00adb5; /* Detalhe em azul tecnológico */
        }

        h1 { 
            color: #00adb5; 
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p { 
            color: #b3b3b3; 
            font-size: 1.2rem; 
            line-height: 1.6;
        }

        /* Moldura do botão de status */
        .status-badge {
            display: inline-block;
            background-color: rgba(0, 173, 181, 0.1);
            color: #00adb5;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 20px;
            border: 1px solid rgba(0, 173, 181, 0.3);
        }

        /* Estilização exclusiva do LED Verde */
        .led-verde {
            color: #00ff66; /* Verde vivo */
            margin-right: 5px;
            text-shadow: 0 0 8px #00ff66, 0 0 15px #00ff66; /* Efeito de luz acesa */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>LFelipe - Tech</h1>
        <p>O domínio <strong>lfelipe.tec.br</strong> está configurado e operacional.</p>
        <span class="status-badge"><span class="led-verde">●</span> Servidor Ativo</span>
    </div>

</body>
</html>
